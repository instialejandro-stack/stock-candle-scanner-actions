name: Daily Candle Scan

on:
  schedule:
    - cron: "30 22 * * 1-5"
      timezone: "Atlantic/Canary"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        run: python scanner.py

      - name: Run intraday analyzer
        run: python intraday_analyzer.py

      - name: Commit updated report files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            output/top10_bullish_candles.csv \
            output/history_top10_bullish_candles.csv \
            output/intraday_candidates.csv \
            output/intraday_candidates.md \
            output/history_intraday_candidates.csv
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update daily intraday report"
            git push
          fi

      - name: Send Telegram report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python send_telegram_report.py
